services:
  mock-api:
    build:
      context: ./mock-api
    container_name: taskflow-mock-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      PORT: 4000
      JWT_SECRET: "${JWT_SECRET:-taskflow_dev_secret}"
    volumes:
      - ./mock-api/db.json:/app/db.json

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:4000}"
    container_name: taskflow-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - mock-api
